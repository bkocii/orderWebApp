<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 30px;
        }
        .card {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 8px;
            background: #111827;
            color: white;
            cursor: pointer;
        }
        .errorlist {
            color: #b91c1c;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Staff Login</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <label>Username</label>
            {{ form.username }}
            <label>Password</label>
            {{ form.password }}
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
